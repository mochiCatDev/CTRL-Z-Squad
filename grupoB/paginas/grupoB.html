<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo B - Mundial 2026</title>
  <link rel="stylesheet" href="grupoB.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <span class="nav-logo">FIFA World Cup 2026</span>
    <span class="nav-grupo">Grupo B</span>
  </nav>

  <header class="hero">
    <p class="hero-sub">COPA MUNDIAL DE LA FIFA</p>
    <h1 class="hero-title">Grupo B</h1>
    <p class="hero-desc">Canadá · Bosnia y Herzegovina · Catar · Suiza</p>
    <div class="hero-line"></div>
  </header>

  <main>
    <section class="equipos">

      <div class="equipo">
        <div class="equipo-flag">
          <img src="https://flagcdn.com/w160/ca.png" alt="Canadá">
        </div>
        <div class="equipo-info">
          <h3>Canadá</h3>
          <p>Anfitrión</p>
        </div>
      </div>

      <div class="equipo">
        <div class="equipo-flag">
          <img src="https://flagcdn.com/w160/ba.png" alt="Bosnia y Herzegovina">
        </div>
        <div class="equipo-info">
          <h3>Bosnia y Herzegovina</h3>
          <p>UEFA</p>
        </div>
      </div>

      <div class="equipo">
        <div class="equipo-flag">
          <img src="https://flagcdn.com/w160/qa.png" alt="Catar">
        </div>
        <div class="equipo-info">
          <h3>Catar</h3>
          <p>AFC</p>
        </div>
      </div>

      <div class="equipo">
        <div class="equipo-flag">
          <img src="https://flagcdn.com/w160/ch.png" alt="Suiza">
        </div>
        <div class="equipo-info">
          <h3>Suiza</h3>
          <p>UEFA</p>
        </div>
      </div>

    </section>
  </main>

  <footer>
    <p>CTRL-Z-Squad &nbsp;·&nbsp; Mundial 2026</p>
  </footer>

  <script src="grupoB.js"></script>
</body>
</html>
