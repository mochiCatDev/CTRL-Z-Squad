<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mundial 2026 - Suiza</title>
    <link rel="stylesheet" href="../pais.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  </head>
  <body>
    <header>
      <img
        src="https://flagcdn.com/w40/ba.png"
        alt="Catar"
        class="flag-header"
      />
      <h1>Suiza</h1>
      <p>UEFA</p>
      <a class="btn-scroll" href="#contenido"
        ><i class="fa-solid fa-angles-down"></i
      ></a>
    </header>

    <div id="contenido" class="container">
      <a href="../../paginas/grupoB.html" class="btn-atras"
        ><i class="fa-solid fa-angle-left"></i> Volver al Grupo B</a
      >

      <section class="seccion-glass">
        <h2 class="seccion-titulo">Rendimiento Actual</h2>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>PJ</th>
                <th>PG</th>
                <th>PE</th>
                <th>PP</th>
                <th>GF</th>
                <th>GC</th>
                <th>DG</th>
                <th>Pts</th>
              </tr>
            </thead>
            <tbody id="tabla-rendimiento"></tbody>
          </table>
        </div>
      </section>

      <section class="seccion-glass">
        <h2 class="seccion-titulo">Perfil de la Selección</h2>
        <div class="bloque-info">
          <h3><i class="fas fa-history"></i> Historia Mundialista</h3>
          <p id="historia-texto"></p>
        </div>
        <div class="bloque-info" style="margin-top: 20px">
          <h3><i class="fas fa-chart-line"></i> Análisis Competitivo</h3>
          <p id="analisis-texto"></p>
        </div>
      </section>

      <section class="seccion-glass">
        <h2 class="seccion-titulo">Fase de grupos</h2>
        <div id="lista-partidos"></div>
      </section>
    </div>

    <footer>
      <p>&copy; 2026 - Copa Mundial de Fútbol</p>
    </footer>

    <script src="suiza.js"></script>
  </body>
</html>
