<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 - Grupo F</title>
    <link rel="stylesheet" href="grupoF.css">
</head>
<body>

    <header>
        <h1>Copa Mundial 2026</h1>
        <p>Análisis Estadístico e Histórico del Grupo F</p>
    </header>

    <div class="container">
        
        <section class="seccion-tabla">
            <h2 class="seccion-titulo">Tabla de Posiciones</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th class="text-left">País</th>
                            <th>PJ</th>
                            <th>PG</th>
                            <th>PE</th>
                            <th>PP</th>
                            <th>GF</th>
                            <th>GC</th>
                            <th>DG</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo">
                        </tbody>
                </table>
            </div>
        </section>

        <h2 class="seccion-titulo">Información de los Equipos</h2>
        <section id="contenedor-equipos" class="grid-equipos">
            </section>

        <section class="seccion-calendario">
            <h2 class="seccion-titulo">Calendario de Partidos</h2>
            <div id="contenedor-calendario" class="grid-jornadas">
                </div>
        </section>

    </div>

    <footer>
        <p>&copy; 2026 - Proyecto de Programación Web Estructurada</p>
    </footer>

    <script src="grupoF.js"></script>
</body>
</html>
