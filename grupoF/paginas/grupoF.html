<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mundial 2026 - Grupo F</title>
    <link rel="stylesheet" href="grupoF.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <h1>Copa Mundial 2026</h1>
      <p>Grupo F</p>
      <a class="btn-scroll" href="#contenido"><i class="fa-solid fa-angles-down"></i></a>
    </header>

    <div id="contenido" class="container">
      <a href="../../index.html" class="btn-atras"><i class="fa-solid fa-angle-left"></i></a>
      <section class="seccion-tabla">
        <h2 class="seccion-titulo">Tabla de Posiciones</h2>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Pos</th>
                <th class="text-left">País</th>
                <th>PJ</th>
                <th>PG</th>
                <th>PE</th>
                <th>PP</th>
                <th>GF</th>
                <th>GC</th>
                <th>DG</th>
                <th>Pts</th>
              </tr>
            </thead>
            <tbody id="tabla-cuerpo"></tbody>
          </table>
        </div>
      </section>

      <h2 class="seccion-titulo">Información de los Equipos</h2>
      <section id="contenedor-equipos" class="grid-equipos"></section>

      <section class="seccion-calendario">
        <h2 class="seccion-titulo">Calendario de Partidos</h2>
        <div id="contenedor-calendario" class="grid-jornadas"></div>
      </section>

      <h2 class="seccion-titulo">Sedes y Estadios Principales</h2>
      <section class="seccion-tabla">
        <div id="contenedor-sedes" class="grid-jornadas"></div>
      </section>

      <h2 class="seccion-titulo">Datos Estadísticos y Curiosidades</h2>
      <section class="seccion-calendario">
        <div id="contenedor-curiosidades"></div>
      </section>
    </div>
    <footer>
      <p>&copy; 2026 - Grupo F</p>
    </footer>

    <script src="grupoF.js"></script>
  </body>
</html>
